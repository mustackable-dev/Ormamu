name: library-test-environment

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: test_sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Test123!
    ports:
      - "1434:1433"

  postgres:
    image: postgres:17-alpine
    container_name: test_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Test123!
    ports:
      - "5433:5432"

  mariadb:
    image: mariadb:11.4
    container_name: test_mariadb
    environment:
      - MARIADB_ROOT_PASSWORD=Test123!
    ports:
      - "3305:3306"

  mysql:
    image: mysql:8.4
    container_name: test_mysql
    environment:
      - MYSQL_ROOT_PASSWORD=Test123!
    ports:
      - "3307:3306"

  mongodb:
    image: mongo:7.0
    container_name: test_mongodb
    ports:
      - "27016:27017"